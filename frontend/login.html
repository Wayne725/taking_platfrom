<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="js/theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 接案平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">接案平台</h1>
        <p class="auth-subtitle">登入您的帳號</p>

        <div id="msg" class="message"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="請輸入密碼" required autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block">登入</button>
        </form>

        <p class="auth-footer">
            還沒有帳號？<a href="register.html">立即註冊</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
(async () => {
    // If already logged in, redirect to index
    try {
        const res = await Auth.me();
        if (res.data?.user) {
            window.location.href = 'index.html';
            return;
        }
    } catch (_) { /* not logged in, stay on page */ }

    const form      = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage('msg');

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showMessage('msg', '請填寫所有必填欄位');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '登入中...';

        try {
            const res = await Auth.login({ email, password });
            if (res.data?.session_id) {
                sessionStorage.setItem('_sid', res.data.session_id);
            }
            window.location.href = 'index.html';
        } catch (err) {
            showMessage('msg', err.message || '登入失敗，請稍後再試');
            submitBtn.disabled = false;
            submitBtn.textContent = '登入';
        }
    });
    mountFloatingThemeToggle();
})();
</script>
</body>
</html>
