<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="js/theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 - 接案平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">接案平台</h1>
        <p class="auth-subtitle">建立新帳號</p>

        <div id="msg" class="message"></div>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="username">用戶名稱</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="至少 3 個字元" required minlength="3" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="至少 6 個字元" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">確認密碼</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="再次輸入密碼" required autocomplete="new-password">
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary btn-block">註冊</button>
        </form>

        <p class="auth-footer">
            已有帳號？<a href="login.html">立即登入</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
(async () => {
    const form      = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessage('msg');

        const username        = document.getElementById('username').value.trim();
        const email           = document.getElementById('email').value.trim();
        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        if (!username || !email || !password || !confirmPassword) {
            showMessage('msg', '請填寫所有必填欄位');
            return;
        }
        if (username.length < 3) {
            showMessage('msg', '用戶名稱至少需要 3 個字元');
            return;
        }
        if (!email.includes('@')) {
            showMessage('msg', 'Email 格式不正確');
            return;
        }
        if (password.length < 6) {
            showMessage('msg', '密碼至少需要 6 個字元');
            return;
        }
        if (password !== confirmPassword) {
            showMessage('msg', '兩次輸入的密碼不一致');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '註冊中...';

        try {
            await Auth.register({ username, email, password });
            showMessage('msg', '註冊成功！即將前往登入頁面...', 'success');
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } catch (err) {
            showMessage('msg', err.message || '註冊失敗，請稍後再試');
            submitBtn.disabled = false;
            submitBtn.textContent = '註冊';
        }
    });
    mountFloatingThemeToggle();
})();
</script>
</body>
</html>
